services:

  # ── Faster-Whisper Server (backend de transcripción) ───
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    # Para GPU NVIDIA, usar:
    #   image: fedirz/faster-whisper-server:latest-cuda
    #   deploy:
    #     resources:
    #       reservations:
    #         devices:
    #           - driver: nvidia
    #             count: 1
    #             capabilities: [gpu]
    ports:
      - "8000:8000"
    volumes:
      - whisper-models:/root/.cache/huggingface
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-base
      - WHISPER__INFERENCE_DEVICE=cpu
    restart: unless-stopped

  # ── (Opcional) Frontend en Docker ──────────────────────
  # En Windows + IIS se recomienda correr el frontend con Node.js nativo
  # y usar solo el servicio "whisper" de este compose.
  # Para levantar solo Whisper: docker compose up whisper -d
  frontend:
    build: .
    ports:
      - "3005:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - NEXT_PUBLIC_WS_URL=/ws
      - NEXT_PUBLIC_DEFAULT_MODEL=base
      - WHISPER_API_URL=http://whisper:8000
    depends_on:
      - whisper
    restart: unless-stopped

volumes:
  whisper-models:
